name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-android:
    name: Build APK
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Ensure build components
        shell: pwsh
        run: ./scripts/ensure-components.ps1

      - name: Build Release APK
        shell: pwsh
        run: ./WebViewer/build.ps1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: webviewer-apk
          path: WebViewer/bin/Release/net8.0-android/*.apk
          if-no-files-found: error
